<svg viewBox="0 0 512 512" width="512" height="512" fill="#0a0a0f" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#f0a030"/>
      <stop offset="100%" stop-color="#e87020"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0a0a0f"/>
  <!-- Logo frame -->
  <rect x="50" y="50" width="412" height="412" rx="100" stroke="url(#logoGrad)" stroke-width="24" fill="none"/>
  <!-- Lens/Circle -->
  <circle cx="256" cy="220" r="80" stroke="url(#logoGrad)" stroke-width="20" fill="none"/>
  <!-- Wave/Hills -->
  <path d="M130 360 Q180 270, 256 310 Q330 350, 380 260" stroke="url(#logoGrad)" stroke-width="20" fill="none" stroke-linecap="round"/>
  <!-- Sun -->
  <circle cx="350" cy="130" r="28" fill="url(#logoGrad)"/>
</svg>
